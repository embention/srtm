name: "💡 [R&D] New Multi-Product Version"
description: "Start the process of a new version for different products."
title: "[product] [project] [major.minor] - Title"
labels: ["Epic", "Comment", "Analysis"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ### 🏷️ Title Instructions
        **Order tags from general to specific (UPPERCASE, ONE WORD per tag).**

        Template examples:
        `[PROJECT] [MILESTONE] [DELIVERABLE] Brief task description`
        `[PROJECT] [ITEM] [DELIVERABLE] Brief task description`
        `[OBJECTIVE] [YEAR] [AREA] Objective name`

        📘 Related procedure: [P.062 - Create Issue](https://documentation.embention.net/062/en/latest/)

        ## Platforms checklist
        - Please check all platforms or targets that will be affected by this release.
        - A full set of 6 tracking sub-issues will be created for each checked option.

  - type: checkboxes
    id: platforms
    attributes:
      label: Affected platforms
      description: "The workflow will create 6 sub-issues for each checked option."
      options:
        - label: "1xVeronte"
        - label: "CEX"
        - label: "MEX"
        - label: "REx"
        - label: "MCx"
        - label: "MC110"
