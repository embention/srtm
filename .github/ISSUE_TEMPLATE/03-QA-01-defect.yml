name: "🚩 [QA] Defect"
description: "Register and track a defect."
title: "[DEFECT] [tag] Text string"
labels: ["Analysis", "Comment", "Defect"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ### 🏷️ Title Instructions
        **Order tags from general to specific (UPPERCASE, ONE WORD per tag).**

        Template examples:
        `[DEFECT] [PROJECT] [ITEM] Brief defect description`
        `[DEFECT] [PRODUCT] [ITEM] [VERSION] Brief defect description`

        📘 Related procedures:
        - [P.062 - Create Issue](https://documentation.embention.net/062/en/latest/)
        - [P.411 - Problem Reporting](https://documentation.embention.net/411/en/latest/)

  - type: input
    id: references
    attributes:
      label: References
      placeholder: "#1234"
    validations:
      required: false

  - type: input
    id: item_name
    attributes:
      label: Item name/version
      placeholder: "If apply, E.g: Veronte AP 4.8"
    validations:
      required: false

  - type: input
    id: Additional_files
    attributes:
      label: Config files
      placeholder: "If apply, Attached .zip .json file"
    validations:
      required: false

  - type: textarea
    id: defect_description
    attributes:
      label: Defect description
      placeholder: "Describe the defect, steps to reproduce, related URLs, screenshots, tracebacks, or errors"
    validations:
      required: true